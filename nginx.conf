# ============================================================
#  mall-admin-web 后台管理前端 Nginx 配置
#
#  【这个文件的作用】
#  后台管理系统前端的 Nginx 服务器配置。
#  浏览器访问 http://106.53.106.41 时（端口 80），请求首先到达这个 Nginx。
#
#  【职责分工】
#  1. 静态文件服务：返回前端 HTML/JS/CSS 等文件
#  2. API 反向代理：将 /mall-admin/* 等 API 请求转发给 Gateway
#  3. 路径重写：/admin/* → /mall-admin/*（兼容旧路径写法）
#  4. SPA 路由：Vue Router history 模式需要所有路径返回 index.html
#
#  【请求链路】
#  浏览器 → Nginx(:80) → Gateway(:8201) → mall-admin / mall-auth
#
#  【部署位置】
#  部署在 tengxun-server (106.53.106.41)，通过 docker-compose 管理。
#  容器名: mall-admin-nginx
#  端口映射: 80:80
#  镜像: mall-swarm-202606:mall-admin-web-latest
#
#  【与 mall-app-web 的区别】
#  本文件多了一个 /admin/ → /mall-admin/ 的路径重写规则。
#  因为后台前端的代码中 VITE_BASE_SERVER_URL=/mall-admin，
#  但部分旧代码或第三方组件可能直接调用 /admin/login，
#  所以需要这个重写规则来兼容。
# ============================================================

# Nginx 工作进程数，auto 表示自动检测 CPU 核心数
worker_processes auto;

events {
    # 每个 worker 进程最多同时处理 1024 个连接
    worker_connections 1024;
}

http {
    # MIME 类型映射（告诉浏览器 .js 是 application/javascript 等）
    include       mime.types;
    default_type  application/octet-stream;

    # 开启高效文件传输（零拷贝），提升静态文件性能
    sendfile        on;
    # 客户端 keep-alive 超时时间（秒）
    keepalive_timeout 65;

    # ============================================================
    #  Gateway 上游服务器
    #  使用容器名 mall-gateway，Docker 网络自动解析为容器 IP
    # ============================================================
    upstream gateway {
        server mall-gateway:8201;
    }

    server {
        listen       80;
        server_name  _;

        # 前端静态文件根目录（Dockerfile 中 COPY 到这里）
        root   /usr/share/nginx/html;
        index  index.html;

        # ============================================================
        #  API 代理规则
        #
        #  前端代码中 VITE_BASE_SERVER_URL=/mall-admin，
        #  所以浏览器发出的请求形如：http://106.53.106.41/mall-admin/admin/login
        #
        #  Nginx 匹配到 /mall-admin/ 前缀后，将整个请求转发给 Gateway。
        #  Gateway 根据路由规则去掉 /mall-admin 前缀，转发到 mall-admin 后端。
        # ============================================================

        # 后台管理 API（商品管理、订单管理、用户管理等）
        location /mall-admin/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 认证授权 API（管理员登录、登出等）
        location /mall-auth/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        #  旧路径兼容重写
        #
        #  后台前端部分代码使用 /admin/login 这样的路径（不带 -mall 前缀），
        #  但 Gateway 路由要求 /mall-admin/admin/login。
        #  所以这里把 /admin/* 重写为 /mall-admin/* 再转发给 Gateway。
        #
        #  示例：
        #  请求 /admin/login → Nginx 重写为 /mall-admin/admin/login → Gateway
        # ============================================================
        location /admin/ {
            proxy_pass http://gateway/mall-admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        #  Vue Router history 模式支持
        #
        #  后台前端使用 Vue Router 的 history 模式（URL 不带 # 号）。
        #  try_files 的含义：
        #  1. 先尝试 $uri（精确文件）
        #  2. 再尝试 $uri/（目录）
        #  3. 都没有就返回 /index.html（SPA 入口）
        # ============================================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============================================================
        #  静态资源缓存策略
        #  JS/CSS/图片等设置 7 天缓存，Vite 构建时加了 hash 所以安全。
        # ============================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
